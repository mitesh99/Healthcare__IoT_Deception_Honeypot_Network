<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <title>Healthcare IoT Honeypot Dashboard</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css"/>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script src="https://cdn.socket.io/4.5.0/socket.io.min.js"></script>
  <style>
    body{background:#0f1117;color:#e2e8f0;font-family:'Segoe UI',sans-serif}
    .topbar{background:#0b0d14;border-bottom:2px solid #4f8ef7;padding:.75rem 1.5rem;display:flex;align-items:center;justify-content:space-between}
    .brand{font-size:1.1rem;font-weight:700;color:#4f8ef7}
    .live{background:#f74f4f;color:#fff;padding:.25rem .75rem;border-radius:20px;font-size:.75rem;animation:pulse 1.5s infinite}
    @keyframes pulse{0%,100%{opacity:1}50%{opacity:.6}}
    .card2{background:#1a1e2e;border:1px solid #2d3250;border-radius:12px;padding:1.25rem;margin-bottom:1.25rem;border-left:4px solid #4f8ef7}
    .card2.red{border-left-color:#f74f4f}.card2.green{border-left-color:#4ff7a0}.card2.yellow{border-left-color:#f7c94f}
    .num{font-size:2.25rem;font-weight:800;color:#4f8ef7}
    .num.red{color:#f74f4f}.num.green{color:#4ff7a0}
    .lbl{color:#718096;font-size:.8rem;text-transform:uppercase;letter-spacing:1px}
    #map{height:380px;border-radius:10px;border:1px solid #2d3250}
    .feed-item{background:#12151f;border-left:3px solid #f74f4f;border-radius:6px;padding:.65rem 1rem;margin-bottom:.5rem;font-size:.85rem}
    .table{color:#e2e8f0}.table thead th{color:#4f8ef7;border-bottom-color:#2d3250;font-size:.8rem}.table td{border-bottom-color:#2d3250}
    select.rng{background:#1a1e2e;border:1px solid #2d3250;color:#e2e8f0;padding:.35rem 1rem;border-radius:8px}
  </style>
</head>
<body>
<div class="topbar">
  <span class="brand"><i class="fas fa-shield-virus me-2"></i>Healthcare IoT Honeypot</span>
  <div class="d-flex align-items-center gap-3">
    <span class="live">● LIVE</span>
    <span id="clock" style="color:#718096;font-size:.85rem"></span>
  </div>
</div>
<div class="container-fluid p-4">
  <div class="d-flex justify-content-end mb-3">
    <select class="rng" id="range">
      <option value="1h">Last Hour</option>
      <option value="24h" selected>Last 24 Hours</option>
      <option value="7d">Last 7 Days</option>
      <option value="30d">Last 30 Days</option>
    </select>
  </div>
  <div class="row g-3 mb-2">
    <div class="col-md-3"><div class="card2"><div class="lbl">Total Attacks</div><div class="num" id="total">—</div></div></div>
    <div class="col-md-3"><div class="card2 red"><div class="lbl">Unique Attackers</div><div class="num red" id="unique">—</div></div></div>
    <div class="col-md-3"><div class="card2 green"><div class="lbl">Malware Samples</div><div class="num green" id="malware">0</div></div></div>
    <div class="col-md-3"><div class="card2 yellow"><div class="lbl">Countries</div><div class="num" style="color:#f7c94f" id="countries">—</div></div></div>
  </div>
  <div class="row g-3 mb-2">
    <div class="col-md-8"><div class="card2"><h6 style="color:#4f8ef7">Global Attack Map</h6><div id="map"></div></div></div>
    <div class="col-md-4"><div class="card2"><h6 style="color:#4f8ef7">Attack Timeline</h6><canvas id="tlChart" height="300"></canvas></div></div>
  </div>
  <div class="row g-3 mb-2">
    <div class="col-md-4"><div class="card2"><h6 style="color:#4f8ef7">Attack Types</h6><canvas id="typeChart" height="250"></canvas></div></div>
    <div class="col-md-4"><div class="card2"><h6 style="color:#4f8ef7">Top Attacking IPs</h6><div style="max-height:260px;overflow-y:auto"><table class="table table-sm"><thead><tr><th>IP</th><th>Attacks</th><th></th></tr></thead><tbody id="ips"></tbody></table></div></div></div>
    <div class="col-md-4"><div class="card2"><h6 style="color:#4f8ef7">Top Usernames</h6><div style="max-height:260px;overflow-y:auto"><table class="table table-sm"><thead><tr><th>Username</th><th>Count</th></tr></thead><tbody id="users"></tbody></table></div></div></div>
  </div>
  <div class="card2"><h6 style="color:#4f8ef7">Real-time Attack Feed</h6><div id="feed" style="max-height:300px;overflow-y:auto"><div style="color:#718096">Attacks ka wait ho raha hai...</div></div></div>
</div>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
const map=L.map('map').setView([20,0],2);
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{attribution:'© OpenStreetMap'}).addTo(map);
let markers=[],tl,tc;
async function loadStats(){
  const r=await fetch(`/api/stats?range=${document.getElementById('range').value}`);
  const d=await r.json();
  document.getElementById('total').textContent=d.total_attacks||0;
  document.getElementById('unique').textContent=d.unique_attackers||0;
  if(tl)tl.destroy();
  tl=new Chart(document.getElementById('tlChart').getContext('2d'),{type:'line',data:{labels:(d.timeline||[]).map(x=>new Date(x.timestamp).toLocaleTimeString()),datasets:[{label:'Attacks',data:(d.timeline||[]).map(x=>x.count),borderColor:'#4f8ef7',backgroundColor:'rgba(79,142,247,.15)',tension:.3,fill:true}]},options:{responsive:true,plugins:{legend:{display:false}},scales:{y:{beginAtZero:true,grid:{color:'#2d3250'},ticks:{color:'#718096'}},x:{grid:{display:false},ticks:{color:'#718096'}}}}});
  if(tc)tc.destroy();
  tc=new Chart(document.getElementById('typeChart').getContext('2d'),{type:'doughnut',data:{labels:(d.attack_types||[]).map(x=>x.name),datasets:[{data:(d.attack_types||[]).map(x=>x.count),backgroundColor:['#f74f4f','#f7c94f','#4ff7a0','#4f8ef7','#b44ff7'],borderWidth:0}]},options:{responsive:true,plugins:{legend:{position:'bottom',labels:{color:'#e2e8f0'}}}}});
  document.getElementById('ips').innerHTML=(d.top_ips||[]).map(x=>`<tr><td><code>${x.ip}</code></td><td>${x.count}</td><td><a href="https://www.virustotal.com/gui/ip-address/${x.ip}" target="_blank" class="btn btn-sm btn-outline-secondary py-0">🔍</a></td></tr>`).join('');
  document.getElementById('users').innerHTML=(d.top_usernames||[]).map(x=>`<tr><td>${x.username}</td><td>${x.count}</td></tr>`).join('');
}
async function loadFeed(){
  const r=await fetch('/api/recent_attacks');const d=await r.json();
  document.getElementById('feed').innerHTML='';
  d.forEach(a=>{
    const f=document.getElementById('feed');
    const el=document.createElement('div');el.className='feed-item';
    el.innerHTML=`<div class="d-flex justify-content-between"><span><b>${a.src_ip||'?'}</b> <span class="badge bg-secondary">${a.country||'Unknown'}</span> <span class="badge bg-danger">${a.attack_type||'unknown'}</span></span><small style="color:#718096">${new Date(a.timestamp).toLocaleTimeString()}</small></div>${a.username?`<small style="color:#718096">user: <b>${a.username}</b> | pass: <b>${a.password||'?'}</b></small>`:''}`;
    f.insertBefore(el,f.firstChild);
  });
}
document.addEventListener('DOMContentLoaded',()=>{
  loadStats();loadFeed();
  document.getElementById('range').addEventListener('change',()=>loadStats());
  setInterval(loadStats,30000);setInterval(loadFeed,15000);
  setInterval(()=>{document.getElementById('clock').textContent=new Date().toLocaleString();},1000);
});
</script>
</body>
</html>
