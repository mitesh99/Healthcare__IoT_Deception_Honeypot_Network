networks:
  honeypot_net:
    driver: bridge
    ipam:
      config:
        - subnet: 192.168.100.0/24
  monitoring_net:
    driver: bridge

services:
  cowrie:
    build: ./honeypot/cowrie
    container_name: cowrie_honeypot
    networks:
      honeypot_net:
        ipv4_address: 192.168.100.10
    ports:
      - "2222:2222"
      - "2223:2223"
    volumes:
      - ./data/logs/cowrie:/var/log/cowrie
    restart: unless-stopped

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.6.0
    container_name: elasticsearch
    networks:
      - monitoring_net
    environment:
      - discovery.type=single-node
      - "ES_JAVA_OPTS=-Xms512m -Xmx512m"
      - xpack.security.enabled=false
    volumes:
      - es_data:/usr/share/elasticsearch/data
    ports:
      - "9200:9200"
    restart: unless-stopped

  logstash:
    image: docker.elastic.co/logstash/logstash:8.6.0
    container_name: logstash
    networks:
      - honeypot_net
      - monitoring_net
    volumes:
      - ./logging/logstash/pipeline:/usr/share/logstash/pipeline:ro
      - ./data/logs:/var/log/honeypot:ro
    depends_on:
      - elasticsearch
    restart: unless-stopped

  kibana:
    image: docker.elastic.co/kibana/kibana:8.6.0
    container_name: kibana
    networks:
      - monitoring_net
    environment:
      - ELASTICSEARCH_HOSTS=http://elasticsearch:9200
    ports:
      - "5601:5601"
    depends_on:
      - elasticsearch
    restart: unless-stopped

  filebeat:
    image: docker.elastic.co/beats/filebeat:8.6.0
    container_name: filebeat
    networks:
      - honeypot_net
      - monitoring_net
    user: root
    volumes:
      - ./logging/filebeat/filebeat.yml:/usr/share/filebeat/filebeat.yml:ro
      - ./data/logs:/var/log/honeypot:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
    depends_on:
      - logstash
    restart: unless-stopped

  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    networks:
      - monitoring_net
    volumes:
      - ./monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
    ports:
      - "9090:9090"
    restart: unless-stopped

  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    networks:
      - monitoring_net
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin123
    ports:
      - "3000:3000"
    restart: unless-stopped

  dashboard:
    build: ./dashboard
    container_name: attack_dashboard
    networks:
      - monitoring_net
    ports:
      - "5000:5000"
    environment:
      - ELASTICSEARCH_HOST=http://elasticsearch:9200
      - SECRET_KEY=change-me-in-production
    volumes:
      - ./data/processed:/app/data/processed
    depends_on:
      - elasticsearch
    restart: unless-stopped

volumes:
  es_data:
