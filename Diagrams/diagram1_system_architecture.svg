<svg width="100%" viewBox="0 0 680 520" xmlns="http://www.w3.org/2000/svg">
<defs>
  <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
  <style>
    .t  { font: 400 14px "Segoe UI",Arial,sans-serif; fill: #1a1a2e; }
    .ts { font: 400 12px "Segoe UI",Arial,sans-serif; fill: #445863; }
    .th { font: 500 14px "Segoe UI",Arial,sans-serif; fill: #1a1a2e; }
    .tw { font: 500 13px "Segoe UI",Arial,sans-serif; fill: #ffffff; }
    .tws{ font: 400 11px "Segoe UI",Arial,sans-serif; fill: #90C9F8; }
  </style>
</defs>

<!-- Title -->
<text class="th" x="340" y="28" text-anchor="middle" font-size="16" font-weight="700" fill="#0C1A2A">Healthcare IoT Honeypot — System Architecture</text>

<!-- ── INTERNET ATTACKERS (top) ── -->
<rect x="230" y="45" width="220" height="50" rx="10" fill="#FCEBEB" stroke="#A32D2D" stroke-width="1"/>
<text class="th" x="340" y="66" text-anchor="middle" fill="#A32D2D">Internet Attackers</text>
<text class="ts" x="340" y="84" text-anchor="middle">SSH Brute Force / Credential Theft / Malware</text>

<!-- Arrow down to Cowrie -->
<line x1="340" y1="95" x2="340" y2="125" stroke="#A32D2D" stroke-width="1.5" marker-end="url(#arrow)"/>
<text class="ts" x="355" y="114" fill="#A32D2D">port 2222</text>

<!-- ── COWRIE HONEYPOT ── -->
<rect x="160" y="125" width="360" height="70" rx="12" fill="#E6F1FB" stroke="#1563BE" stroke-width="1.5"/>
<text class="th" x="340" y="149" text-anchor="middle" fill="#0C1A2A" font-size="14">Cowrie SSH/Telnet Honeypot</text>
<text class="ts" x="340" y="168" text-anchor="middle">Simulates: CareFusion Patient Monitor v2.3.1</text>
<text class="ts" x="340" y="183" text-anchor="middle">hostname: patient-monitor-03  |  fake patient records + vitals logs</text>

<!-- Arrow down to Filebeat -->
<line x1="340" y1="195" x2="340" y2="220" stroke="#1563BE" stroke-width="1.5" marker-end="url(#arrow)"/>
<text class="ts" x="355" y="212" fill="#445863">cowrie.json logs</text>

<!-- ── FILEBEAT ── -->
<rect x="240" y="220" width="200" height="44" rx="8" fill="#EAF3DE" stroke="#3B6D11" stroke-width="1"/>
<text class="th" x="340" y="238" text-anchor="middle" fill="#1a1a2e">Filebeat</text>
<text class="ts" x="340" y="254" text-anchor="middle">Log shipper — ships to Logstash:5044</text>

<!-- Arrow to Logstash -->
<line x1="340" y1="264" x2="340" y2="289" stroke="#3B6D11" stroke-width="1.5" marker-end="url(#arrow)"/>

<!-- ── LOGSTASH ── -->
<rect x="160" y="289" width="360" height="60" rx="10" fill="#FAEEDA" stroke="#854F0B" stroke-width="1"/>
<text class="th" x="340" y="311" text-anchor="middle" fill="#1a1a2e">Logstash Pipeline</text>
<text class="ts" x="340" y="328" text-anchor="middle">Parse JSON  →  Add GeoIP location  →  Classify attack_type</text>
<text class="ts" x="340" y="343" text-anchor="middle">bruteforce | credential_theft | command_injection | malware_delivery</text>

<!-- Arrow to Elasticsearch -->
<line x1="340" y1="349" x2="340" y2="374" stroke="#854F0B" stroke-width="1.5" marker-end="url(#arrow)"/>

<!-- ── ELASTICSEARCH ── -->
<rect x="180" y="374" width="320" height="44" rx="8" fill="#E3EDF9" stroke="#1563BE" stroke-width="1.5"/>
<text class="th" x="340" y="394" text-anchor="middle" fill="#1a1a2e">Elasticsearch  :9200</text>
<text class="ts" x="340" y="410" text-anchor="middle">Index: honeypot-YYYY.MM.DD  |  GeoIP + attack_type stored</text>

<!-- Arrows to Kibana and Dashboard -->
<line x1="260" y1="418" x2="160" y2="455" stroke="#1563BE" stroke-width="1.5" marker-end="url(#arrow)"/>
<line x1="420" y1="418" x2="520" y2="455" stroke="#1563BE" stroke-width="1.5" marker-end="url(#arrow)"/>

<!-- ── KIBANA ── -->
<rect x="60" y="455" width="200" height="44" rx="8" fill="#EEEDFE" stroke="#534AB7" stroke-width="1"/>
<text class="th" x="160" y="475" text-anchor="middle" fill="#1a1a2e">Kibana  :5601</text>
<text class="ts" x="160" y="491" text-anchor="middle">Log exploration + charts</text>

<!-- ── FLASK DASHBOARD ── -->
<rect x="420" y="455" width="200" height="44" rx="8" fill="#E1F5EE" stroke="#0F6E56" stroke-width="1"/>
<text class="th" x="520" y="475" text-anchor="middle" fill="#1a1a2e">Flask Dashboard  :5000</text>
<text class="ts" x="520" y="491" text-anchor="middle">Real-time attack map + stats</text>

<!-- Legend -->
<rect x="20" y="45" width="130" height="95" rx="6" fill="none" stroke="#C5D8F0" stroke-width="0.5" stroke-dasharray="4,2"/>
<text class="ts" x="30" y="60" fill="#445863" font-weight="500">Legend</text>
<rect x="30" y="68" width="10" height="10" rx="2" fill="#FCEBEB" stroke="#A32D2D" stroke-width="0.5"/>
<text class="ts" x="46" y="78">Threat source</text>
<rect x="30" y="84" width="10" height="10" rx="2" fill="#E6F1FB" stroke="#1563BE" stroke-width="0.5"/>
<text class="ts" x="46" y="94">Honeypot layer</text>
<rect x="30" y="100" width="10" height="10" rx="2" fill="#FAEEDA" stroke="#854F0B" stroke-width="0.5"/>
<text class="ts" x="46" y="110">Processing layer</text>
<rect x="30" y="116" width="10" height="10" rx="2" fill="#E3EDF9" stroke="#1563BE" stroke-width="0.5"/>
<text class="ts" x="46" y="126">Storage + UI layer</text>
</svg>