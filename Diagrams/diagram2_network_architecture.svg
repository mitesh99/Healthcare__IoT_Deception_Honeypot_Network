<svg width="100%" viewBox="0 0 680 480" xmlns="http://www.w3.org/2000/svg">
<defs>
  <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
  <style>
    .t  { font: 400 14px "Segoe UI",Arial,sans-serif; fill: #1a1a2e; }
    .ts { font: 400 12px "Segoe UI",Arial,sans-serif; fill: #445863; }
    .th { font: 500 14px "Segoe UI",Arial,sans-serif; fill: #1a1a2e; }
  </style>
</defs>

<!-- Title -->
<text class="th" x="340" y="28" text-anchor="middle" font-size="16" font-weight="700" fill="#0C1A2A">Network Architecture — Docker Networks</text>

<!-- ── INTERNET (outside) ── -->
<rect x="270" y="42" width="140" height="36" rx="18" fill="#FCEBEB" stroke="#A32D2D" stroke-width="1"/>
<text class="th" x="340" y="65" text-anchor="middle" fill="#A32D2D" font-size="13">Internet</text>

<line x1="280" y1="78" x2="210" y2="120" stroke="#A32D2D" stroke-width="1.5" marker-end="url(#arrow)"/>
<line x1="400" y1="78" x2="470" y2="120" stroke="#A32D2D" stroke-width="1.5" marker-end="url(#arrow)"/>
<text class="ts" x="195" y="110" text-anchor="middle" fill="#A32D2D">:2222</text>
<text class="ts" x="486" y="110" text-anchor="middle" fill="#A32D2D">:2223</text>

<!-- ── honeypot_net (left container) ── -->
<rect x="40" y="120" width="280" height="200" rx="14" fill="none" stroke="#1563BE" stroke-width="1.5" stroke-dasharray="6,3"/>
<text class="th" x="180" y="142" text-anchor="middle" fill="#1563BE" font-size="12">honeypot_net  192.168.100.0/24</text>

<!-- Cowrie inside honeypot_net -->
<rect x="70" y="158" width="220" height="60" rx="8" fill="#E6F1FB" stroke="#1563BE" stroke-width="1"/>
<text class="th" x="180" y="180" text-anchor="middle" fill="#0C1A2A">cowrie_honeypot</text>
<text class="ts" x="180" y="196" text-anchor="middle">192.168.100.10</text>
<text class="ts" x="180" y="210" text-anchor="middle">SSH:2222  Telnet:2223</text>

<!-- Logstash inside honeypot_net -->
<rect x="70" y="234" width="220" height="50" rx="8" fill="#FAEEDA" stroke="#854F0B" stroke-width="1"/>
<text class="th" x="180" y="256" text-anchor="middle" fill="#0C1A2A">logstash</text>
<text class="ts" x="180" y="272" text-anchor="middle">port 5044 — receives from Filebeat</text>

<!-- Filebeat inside honeypot_net -->
<rect x="70" y="296" width="220" height="40" rx="8" fill="#EAF3DE" stroke="#3B6D11" stroke-width="1"/>
<text class="th" x="180" y="313" text-anchor="middle" fill="#0C1A2A">filebeat</text>
<text class="ts" x="180" y="328" text-anchor="middle">ships logs to logstash:5044</text>

<!-- Arrow: filebeat to logstash -->
<line x1="180" y1="296" x2="180" y2="284" stroke="#3B6D11" stroke-width="1" marker-end="url(#arrow)"/>

<!-- ── monitoring_net (right container) ── -->
<rect x="360" y="120" width="280" height="200" rx="14" fill="none" stroke="#534AB7" stroke-width="1.5" stroke-dasharray="6,3"/>
<text class="th" x="500" y="142" text-anchor="middle" fill="#534AB7" font-size="12">monitoring_net  (bridge)</text>

<!-- Elasticsearch -->
<rect x="390" y="158" width="220" height="50" rx="8" fill="#E3EDF9" stroke="#1563BE" stroke-width="1.5"/>
<text class="th" x="500" y="178" text-anchor="middle" fill="#0C1A2A">elasticsearch</text>
<text class="ts" x="500" y="196" text-anchor="middle">port 9200  |  data storage</text>

<!-- Kibana -->
<rect x="390" y="220" width="100" height="44" rx="8" fill="#EEEDFE" stroke="#534AB7" stroke-width="1"/>
<text class="th" x="440" y="240" text-anchor="middle" fill="#0C1A2A">kibana</text>
<text class="ts" x="440" y="256" text-anchor="middle">:5601</text>

<!-- Dashboard -->
<rect x="508" y="220" width="102" height="44" rx="8" fill="#E1F5EE" stroke="#0F6E56" stroke-width="1"/>
<text class="th" x="559" y="240" text-anchor="middle" fill="#0C1A2A">dashboard</text>
<text class="ts" x="559" y="256" text-anchor="middle">:5000</text>

<!-- Grafana -->
<rect x="390" y="278" width="100" height="36" rx="8" fill="#FAF0E6" stroke="#CC5500" stroke-width="1"/>
<text class="th" x="440" y="293" text-anchor="middle" fill="#0C1A2A">grafana</text>
<text class="ts" x="440" y="307" text-anchor="middle">:3000</text>

<!-- Prometheus -->
<rect x="508" y="278" width="102" height="36" rx="8" fill="#FFF8E1" stroke="#F57F17" stroke-width="1"/>
<text class="th" x="559" y="293" text-anchor="middle" fill="#0C1A2A">prometheus</text>
<text class="ts" x="559" y="307" text-anchor="middle">:9090</text>

<!-- Arrow: logstash -> elasticsearch (cross-network) -->
<path d="M 320 259 L 390 183" fill="none" stroke="#854F0B" stroke-width="1.5" marker-end="url(#arrow)" stroke-dasharray="5,2"/>
<text class="ts" x="355" y="218" fill="#854F0B" text-anchor="middle">cross-net</text>

<!-- Arrow: elasticsearch -> kibana -->
<line x1="440" y1="208" x2="440" y2="220" stroke="#534AB7" stroke-width="1" marker-end="url(#arrow)"/>
<!-- Arrow: elasticsearch -> dashboard -->
<line x1="559" y1="208" x2="559" y2="220" stroke="#0F6E56" stroke-width="1" marker-end="url(#arrow)"/>

<!-- ── EXTERNAL ACCESS ports (bottom) ── -->
<rect x="40" y="340" width="600" height="44" rx="8" fill="#F8FAFE" stroke="#C5D8F0" stroke-width="1"/>
<text class="th" x="340" y="358" text-anchor="middle" fill="#0C1A2A" font-size="12">Host Machine — Exposed Ports</text>
<text class="ts" x="340" y="374" text-anchor="middle">:2222 (SSH)  |  :5000 (Dashboard)  |  :5601 (Kibana)  |  :3000 (Grafana)  |  :9200 (ES)  |  :9090 (Prometheus)</text>

<!-- ── es_data Volume ── -->
<rect x="40" y="400" width="600" height="40" rx="8" fill="none" stroke="#C5D8F0" stroke-width="0.5" stroke-dasharray="4,2"/>
<text class="ts" x="340" y="415" text-anchor="middle" fill="#445863">Docker Volume: es_data  (Elasticsearch persistent storage — survives container restarts)</text>
<text class="ts" x="340" y="432" text-anchor="middle" fill="#445863">Data: data/logs/cowrie/  |  data/processed/  |  data/GeoLite2-City.mmdb</text>

<!-- Cowrie log file arrow to filebeat -->
<line x1="180" y1="218" x2="180" y2="296" stroke="#3B6D11" stroke-width="0.8" stroke-dasharray="3,2"/>
<text class="ts" x="120" y="260" fill="#3B6D11">cowrie.json</text>
</svg>